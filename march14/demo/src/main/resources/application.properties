# ================================================
#   Spring Data JPA - MySQL Configuration
#   Standard IT application.properties
# ================================================

# -----------------------------------------------
# Spring Application Name
# -----------------------------------------------
spring.application.name=DemoApplication

# -----------------------------------------------
# MySQL DataSource Configuration
# -----------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/student-database
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------------------------
# JPA / Hibernate Configuration
# -----------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
# Options: none | validate | update | create | create-drop
# Use 'validate' or 'none' in PRODUCTION

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# -----------------------------------------------
# Hibernate Performance / Batch Settings
# -----------------------------------------------
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false